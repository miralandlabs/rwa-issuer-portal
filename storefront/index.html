<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RWA Issuer Portal · x402</title>
    <meta
      name="description"
      content="Register an RWA issuer and submit investor KYC for the x402 rwa-kyc-hook. Off-chain system of record. Simple, elegant, on-chain-bound."
    />
    <script>
      (function () {
        var k = "rwa-issuer-portal-theme";
        var t = null;
        try {
          t = localStorage.getItem(k);
        } catch (e) {}
        document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/theme.css" />
    <link rel="stylesheet" href="/src/app.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
